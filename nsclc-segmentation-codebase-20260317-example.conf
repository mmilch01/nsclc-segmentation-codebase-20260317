# ------------------------------------------------------------------------------
# This configuration file is to be used with the build_deploy_custom_image.sh
# script, which builds a Docker image using a local environment directory,
# tags it, authenticates to a Docker registry, and pushes the image.
#
# ------------------------------------------------------------------------------

#Docker image name (:tag optional)
#REMOTE_IMAGE: target image name (including tag) to push to registry
REMOTE_IMAGE=mmilch01/nsclc-segmentation-codebase-20260317:latest

#LOCAL_IMAGE: existing local Docker image to tag and push
#Typically same as REMOTE_IMAGE if already built with final name
LOCAL_IMAGE="$REMOTE_IMAGE"

#DOCKER_REPO: Docker registry to authenticate against (default docker.io)
DOCKER_REPO=docker.io

#The following three folders will be provided to docker build as an external build context
#and copied into the image (e.g. into /opt/packages/user/env_repo/)

# Absolute path to local environment directory
LOCAL_ENV_FOLDER="/opt/packages/user/env_repo"
# Folder with user algorithms to embed into the Docker image.
LOCAL_ALG_FOLDER="<segmentation algorithm source dir>"
# Folder with user algorithms to embed into the Docker image.
LOCAL_RUNTIME_FOLDER="<this Docker image runtime repo dir>"

#list extra environment variables for ENV dockerfile directive, e.g. "VAR1=val1 VAR2=val2"
ENV_VARS=""
